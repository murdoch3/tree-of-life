<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tree of Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #1a1410;
      color: #e8dfc8;
      overflow: hidden;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* Left panel — tree */
    #left {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 420px;
      min-width: 280px;
      flex-shrink: 0;
      border-right: 1px solid #2e2518;
      overflow-y: auto;
      padding: 32px 16px 32px;
      scrollbar-width: thin;
      scrollbar-color: #3a2e1e transparent;
    }
    #left::-webkit-scrollbar { width: 4px; }
    #left::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 2px; }

    #left h1 {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: #c9a84c;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 0.8rem;
      font-style: italic;
      color: #8a7a5a;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      text-align: center;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      font-size: 0.75rem;
      color: #8a7a5a;
      letter-spacing: 0.05em;
      flex-wrap: wrap;
      justify-content: center;
    }
    .controls input[type=range] {
      -webkit-appearance: none;
      width: 100px;
      height: 2px;
      background: #3a2e1e;
      outline: none;
      border-radius: 2px;
    }
    .controls input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #c9a84c;
      cursor: pointer;
    }

    #view-toggle {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: #8a7a5a;
      background: none;
      border: 1px solid #3a2e1e;
      padding: 4px 10px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    #view-toggle:hover { color: #c9a84c; border-color: #c9a84c; }

    #svg-container svg {
      width: 100%;
      max-width: 360px;
      display: block;
    }

    /* Right panel — info */
    #right {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #info-panel {
      flex: 1;
      overflow-y: auto;
      padding: 48px 56px;
      scrollbar-width: thin;
      scrollbar-color: #3a2e1e transparent;
    }
    #info-panel::-webkit-scrollbar { width: 4px; }
    #info-panel::-webkit-scrollbar-thumb { background: #3a2e1e; border-radius: 2px; }

    /* Empty state */
    #info-empty {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3a2e1e;
      font-size: 1.1rem;
      font-style: italic;
      letter-spacing: 0.1em;
      user-select: none;
    }

    /* Info content */
    #info-content { display: none; }
    #info-content.visible { display: block; }

    #info-label {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      color: #5a4e38;
      letter-spacing: 0.25em;
      margin-bottom: 8px;
    }
    #info-title {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: #c9a84c;
      margin-bottom: 20px;
      letter-spacing: 0.03em;
      line-height: 1.2;
    }
    .info-divider {
      width: 48px;
      height: 1px;
      background: #c9a84c;
      margin-bottom: 24px;
      opacity: 0.4;
    }
    #info-text {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #c8bfa8;
      font-style: italic;
    }
    #info-text p { margin-bottom: 1.1em; }
    #info-text p:last-child { margin-bottom: 0; }
    #info-text strong {
      color: #c9a84c;
      font-style: normal;
    }
    #info-text em { color: #a89878; }
    #info-text h2, #info-text h3 {
      font-family: 'Cinzel', serif;
      font-style: normal;
      color: #c9a84c;
      font-weight: 400;
      margin: 1.2em 0 0.5em;
      letter-spacing: 0.08em;
    }
    #info-text h2 { font-size: 1.1rem; }
    #info-text h3 { font-size: 0.9rem; color: #8a7a5a; }

    /* ── Card gallery in info panel ── */
    .card-gallery {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 10px 0 6px;
    }
    .card-thumb-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }
    .card-thumb {
      height: 110px;
      width: auto;
      border: 1px solid #3a2e1e;
      display: block;
      transition: border-color 0.2s, transform 0.15s;
    }
    .card-thumb:hover { border-color: #c9a84c; transform: scale(1.04); }
    .card-thumb-name {
      font-size: 0.62rem;
      font-family: 'Cinzel', serif;
      color: #6a5a3a;
      letter-spacing: 0.04em;
      text-align: center;
      max-width: 80px;
      line-height: 1.3;
      font-style: normal;
    }

    /* SVG elements */
    .sephirah {
      fill: #1a1410;
      stroke: #c9a84c;
      stroke-width: 0.06;
      cursor: pointer;
      transition: fill 0.2s;
    }
    .sephirah:hover { fill: #2e2210; }
    .sephirah.active { fill: #2a1f0a; stroke: #e8c86a; }

    .seph-label {
      font-family: 'Cinzel', serif;
      font-size: 0.48px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      fill: #c9a84c;
    }
    .seph-number {
      font-size: 0.38px;
      fill: #8a7a5a;
    }

    .path-line {
      stroke: #4a3c28;
      stroke-width: 0.08;
      transition: stroke 0.2s;
    }
    .path-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.42px;
      text-anchor: middle;
      dominant-baseline: middle;
      pointer-events: none;
      fill: #7a6a4a;
      transition: fill 0.2s;
    }
    .path-hit {
      fill: transparent;
      stroke: none;
      cursor: pointer;
    }
    .path-group:hover .path-line { stroke: #c9a84c; }
    .path-group:hover .path-label { fill: #c9a84c; }
    .path-group.active .path-line { stroke: #e8c86a; }
    .path-group.active .path-label { fill: #e8c86a; }

    /* ── Card view SVG styles ── */
    .cv-seph-hit {
      fill: transparent;
      stroke: none;
      cursor: pointer;
    }
    .cv-card-img {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .cv-card-img:hover { opacity: 0.85; }
    .cv-group:hover .cv-seph-border { stroke: #e8c86a; }
    .cv-seph-border {
      fill: none;
      stroke: #c9a84c;
      stroke-width: 0.04;
      pointer-events: none;
    }
    .cv-path-group { cursor: pointer; }
    .cv-path-group:hover .cv-path-card { opacity: 0.85; }
    .cv-path-card { transition: opacity 0.15s; }
    .cv-path-frame {
      fill: none;
      stroke: #4a3c28;
      stroke-width: 0.035;
      pointer-events: none;
      transition: stroke 0.15s;
    }
    .cv-path-group:hover .cv-path-frame { stroke: #c9a84c; }
    .cv-path-group.active .cv-path-frame { stroke: #e8c86a; }
    .cv-group.active .cv-seph-border { stroke: #e8c86a; }

    /* ── Guide lines in card view ── */
    .cv-guide-line {
      stroke: #2e2518;
      stroke-width: 0.055;
      stroke-dasharray: 0.18 0.1;
    }
    .cv-path-group:hover .cv-guide-line { stroke: #7a6a4a; }
    .cv-path-group.active .cv-guide-line { stroke: #c9a84c; }

    /* ── Card view: full-screen, fixed height, no info panel ── */
    .card-view-mode #right { display: none; }
    .card-view-mode #left {
      width: 100%;
      max-width: 100%;
      border-right: none;
      padding: 16px 24px 0;
      overflow: hidden;
    }
    /* flex: 1 + min-height: 0 lets the container grow to fill remaining panel
       height without overflowing; SVG height: 100% then fills it exactly */
    .card-view-mode #svg-container {
      flex: 1;
      width: 100%;
      min-height: 0;
    }
    .card-view-mode #svg-container svg {
      max-width: none;
      width: 100%;
      height: 100%;
    }
    .card-view-mode #svg-container { cursor: grab; }
    .card-view-mode #svg-container.dragging { cursor: grabbing; }

    /* Sephirah name labels in card view */
    .cv-seph-label {
      font-family: 'Cinzel', serif;
      font-size: 0.38px;
      fill: #c9a84c;
      text-anchor: middle;
      dominant-baseline: hanging;
      pointer-events: none;
      letter-spacing: 0.04px;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 8, 5, 0.94);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      cursor: pointer;
    }
    #lightbox.open { display: flex; }
    #lightbox-img {
      max-height: 80vh;
      max-width: 88vw;
      object-fit: contain;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }
    #lightbox-caption {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.2em;
      color: #8a7a5a;
    }
    #lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      font-size: 1.4rem;
      color: #5a4e38;
      cursor: pointer;
      user-select: none;
      line-height: 1;
    }
    #lightbox-close:hover { color: #c9a84c; }

    /* Hide back button on desktop */
    #mobile-back { display: none; }

    /* ── Mobile: slide between tree and info ── */
    @media (max-width: 700px) {
      html, body { overflow: hidden; }

      #app {
        flex-direction: row;
        width: 200vw;
        height: 100vh;
        transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      }
      #app.show-info {
        transform: translateX(-100vw);
      }

      #left {
        width: 100vw;
        height: 100vh;
        border-right: none;
        flex-shrink: 0;
      }

      #right {
        width: 100vw;
        height: 100vh;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
      }

      #mobile-back {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 16px 20px;
        font-family: 'Cinzel', serif;
        font-size: 0.7rem;
        letter-spacing: 0.15em;
        color: #8a7a5a;
        border-bottom: 1px solid #2e2518;
        cursor: pointer;
        user-select: none;
        flex-shrink: 0;
      }
      #mobile-back:active { color: #c9a84c; }
      #mobile-back svg { width: 14px; height: 14px; }

      #info-panel {
        flex: 1;
        overflow-y: auto;
        padding: 28px 24px 40px;
      }

      #info-empty { min-height: 200px; }

      .card-thumb { height: 90px; }
    }
  </style>
</head>
<body>

<div id="app">

    <!-- Left: Tree -->
    <div id="left">
      <h1>Tree of Life</h1>
      <p class="subtitle">Click a sephirah or path</p>
      <div class="controls">
        <span>Overview</span>
        <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        <span>Detail</span>
        <button id="view-toggle" onclick="toggleView()">Card View</button>
      </div>
      <div id="svg-container"></div>
    </div>

    <!-- Right: Info -->
    <div id="right">
      <div id="mobile-back" onclick="mobileBack()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
        Tree
      </div>
      <div id="info-panel">
        <div id="info-empty">Select a sephirah or path</div>
        <div id="info-content">
          <div id="info-label"></div>
          <div id="info-title"></div>
          <div class="info-divider"></div>
          <div id="info-text"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- Lightbox -->
  <div id="lightbox" onclick="closeLightbox()">
    <span id="lightbox-close" onclick="closeLightbox()">✕</span>
    <img id="lightbox-img" src="" alt="">
    <div id="lightbox-caption"></div>
  </div>

  <script>
    // ─── DATA ────────────────────────────────────────────────────────────────

    let SEPHIROTH = [];
    let PATHS = [];

    // ─── CONFIG ───────────────────────────────────────────────────────────────

    const R = 1.2;
    const GAP = 0.65;
    const SVG_W = 9.1;
    const PAD = 0.1;

    const SCALE_Y = 1.5;
    let cardView = false;
    let zoomLevel = 1;
    let panX = 0, panY = 0;
    let cvFullVbW = 0, cvFullVbH = 0;
    let isPanning = false, didPan = false;
    let panStart = { x: 0, y: 0, px: 0, py: 0 };

    // Card dimensions in SVG units
    const CV = {
      // small cards for 4-card 2×2 clusters
      sw: 0.55, sh: 0.825,
      // wide cards for 8-card 4×2 clusters
      ww: 0.46, wh: 0.69,
      gap: 0.04,
      // Atu card on path
      aw: 0.65, ah: 0.975,
    };

    // ─── HELPERS ──────────────────────────────────────────────────────────────

    const ns = "http://www.w3.org/2000/svg";

    function el(tag, attrs = {}) {
      const e = document.createElementNS(ns, tag);
      for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
      return e;
    }

    function sephPos(id) {
      const s = SEPHIROTH.find(s => s.id === id);
      return { x: s.x, y: s.y * SCALE_Y };
    }

    // Returns the SVG viewBox string centred on (treeCx + panX, treeCy + panY),
    // zoomed by zoomLevel. Clamped so the viewport never leaves the full tree area.
    function viewBoxForZoom(fullVbW, fullVbH) {
      const vbW = fullVbW / zoomLevel;
      const vbH = fullVbH / zoomLevel;
      const ys = SEPHIROTH.map(s => s.y * SCALE_Y);
      const treeCx = SVG_W / 2;
      const treeCy = (Math.min(...ys) + Math.max(...ys)) / 2;
      // Clamp centre so viewport stays inside [0, fullVbW] × [0, fullVbH]
      const cx = Math.max(vbW / 2, Math.min(fullVbW - vbW / 2, treeCx + panX));
      const cy = Math.max(vbH / 2, Math.min(fullVbH - vbH / 2, treeCy + panY));
      return `${(cx - vbW / 2).toFixed(3)} ${(cy - vbH / 2).toFixed(3)} ${vbW.toFixed(3)} ${vbH.toFixed(3)}`;
    }

    // ─── SYMBOL VIEW RENDER ───────────────────────────────────────────────────

    function render() {
      const maxY = Math.max(...SEPHIROTH.map(s => s.y)) * SCALE_Y;
      const fullVbH = maxY + R + PAD * 2 + 0.5;
      const fullVbW = SVG_W + PAD * 2;

      const svg = el("svg", {
        viewBox: viewBoxForZoom(fullVbW, fullVbH),
      });

      // Paths (drawn first, behind circles)
      const pathsG = el("g", { id: "paths" });

      for (const path of PATHS) {
        const a = sephPos(path.from);
        const b = sephPos(path.to);
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        let angle = Math.atan2(dy, dx) * 180 / Math.PI;
        if (angle > 90 || angle < -90) angle += 180;

        const l1x1 = -(dist / 2 - R);
        const l1x2 = -GAP;
        const l2x1 =  GAP;
        const l2x2 =  dist / 2 - R;

        const g = el("g", {
          class: "path-group",
          transform: `translate(${mx},${my}) rotate(${angle.toFixed(2)})`,
          "data-path-n": path.n,
        });

        g.appendChild(el("rect", {
          class: "path-hit",
          x: -(dist / 2 - R),
          y: -0.4,
          width: dist - R * 2,
          height: 0.8,
        }));

        if (l1x2 > l1x1) {
          g.appendChild(el("line", { class: "path-line", x1: l1x1, y1: 0, x2: l1x2, y2: 0 }));
          g.appendChild(el("line", { class: "path-line", x1: l2x1, y1: 0, x2: l2x2, y2: 0 }));
        }

        const label = el("text", { class: "path-label", x: 0, y: 0 });
        label.textContent = `${path.n} · ${path.letter} (${path.heb})`;
        g.appendChild(label);

        g.addEventListener("click", () => openPathPopup(path));
        pathsG.appendChild(g);
      }

      svg.appendChild(pathsG);

      // Sephiroth
      const sephG = el("g", { id: "sephiroth" });

      for (const s of SEPHIROTH) {
        const cy = s.y * SCALE_Y;

        const circle = el("circle", {
          id: s.id,
          class: "sephirah",
          cx: s.x,
          cy: cy,
          r: R,
        });
        circle.addEventListener("click", () => openPopup(s));
        sephG.appendChild(circle);

        const numText = el("text", {
          class: "seph-label seph-number",
          x: s.x, y: cy - 0.28,
        });
        numText.setAttribute("text-anchor", "middle");
        numText.setAttribute("dominant-baseline", "middle");
        numText.textContent = s.n;
        sephG.appendChild(numText);

        const nameText = el("text", {
          class: "seph-label",
          x: s.x, y: cy + 0.27,
        });
        nameText.setAttribute("text-anchor", "middle");
        nameText.setAttribute("dominant-baseline", "middle");
        nameText.textContent = s.label;
        sephG.appendChild(nameText);
      }

      svg.appendChild(sephG);

      const container = document.getElementById("svg-container");
      container.innerHTML = "";
      container.appendChild(svg);
    }

    // ─── CARD VIEW RENDER ─────────────────────────────────────────────────────

    function clusterDims(cards) {
      // 8-card: 4 cols × 2 rows; 4-card: 2 cols × 2 rows
      const cols = cards.length > 4 ? 4 : 2;
      const rows = Math.ceil(cards.length / cols);
      const cw = cards.length > 4 ? CV.ww : CV.sw;
      const ch = cards.length > 4 ? CV.wh : CV.sh;
      return {
        cols, rows, cw, ch,
        w: cols * cw + (cols - 1) * CV.gap,
        h: rows * ch + (rows - 1) * CV.gap,
      };
    }

    function renderCardView() {
      const maxY = Math.max(...SEPHIROTH.map(s => s.y)) * SCALE_Y;
      cvFullVbH = maxY + 2 + PAD * 2;
      cvFullVbW = SVG_W + PAD * 2;
      const fullVbH = cvFullVbH;
      const fullVbW = cvFullVbW;

      const svg = el("svg", {
        viewBox: viewBoxForZoom(fullVbW, fullVbH),
      });

      // ── Path Atu cards (rotated, with guide lines, behind sephiroth clusters) ──
      for (const path of PATHS) {
        if (!path.atu) continue;
        const a = sephPos(path.from);
        const b = sephPos(path.to);
        const mx = (a.x + b.x) / 2;
        const my = (a.y + b.y) / 2;
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const pathAngle = Math.atan2(dy, dx) * 180 / Math.PI;
        // Rotate so the card's long axis lies along the path direction.
        // pathAngle is measured from the +X axis; card long axis is the Y axis at 0°,
        // so subtracting 90° aligns them. All tree paths go downward (dy ≥ 0),
        // keeping pathAngle in [0°,180°] and cardAngle in [-90°,90°] — never inverted.
        const cardAngle = pathAngle - 90;

        const g = el("g", { class: "cv-path-group", "data-path-n": path.n });

        // Guide line A→B drawn first; sephirah clusters rendered later cover the ends.
        g.appendChild(el("line", {
          class: "cv-guide-line",
          x1: a.x, y1: a.y,
          x2: b.x, y2: b.y,
        }));

        // Card group centered at midpoint, rotated along the path
        const cardG = el("g", {
          transform: `translate(${mx},${my}) rotate(${cardAngle.toFixed(2)})`,
        });
        cardG.appendChild(el("image", {
          class: "cv-path-card",
          href: path.atu.img,
          x: -CV.aw / 2, y: -CV.ah / 2,
          width: CV.aw, height: CV.ah,
          preserveAspectRatio: "xMidYMid meet",
        }));
        cardG.appendChild(el("rect", {
          class: "cv-path-frame",
          x: -CV.aw / 2, y: -CV.ah / 2,
          width: CV.aw, height: CV.ah,
        }));
        // Hit rect inside the rotated group so it tracks the card exactly
        cardG.appendChild(el("rect", {
          class: "cv-seph-hit",
          x: -CV.aw / 2, y: -CV.ah / 2,
          width: CV.aw, height: CV.ah,
        }));
        g.appendChild(cardG);

        g.addEventListener("click", () => openLightbox(path.atu.img, path.atu.name));
        svg.appendChild(g);
      }

      // ── Sephirah card clusters ──
      for (const s of SEPHIROTH) {
        if (!s.cards || !s.cards.length) continue;
        const cy = s.y * SCALE_Y;
        const dim = clusterDims(s.cards);
        const startX = s.x - dim.w / 2;
        const startY = cy - dim.h / 2;

        const g = el("g", { class: "cv-group", "data-seph-id": s.id });

        s.cards.forEach((card, i) => {
          const col = i % dim.cols;
          const row = Math.floor(i / dim.cols);
          const cx2 = startX + col * (dim.cw + CV.gap);
          const cy2 = startY + row * (dim.ch + CV.gap);
          const imgEl = el("image", {
            class: "cv-card-img",
            href: card.img,
            x: cx2, y: cy2,
            width: dim.cw, height: dim.ch,
            preserveAspectRatio: "xMidYMid meet",
          });
          imgEl.addEventListener("click", (e) => {
            e.stopPropagation();
            openLightbox(card.img, card.name);
          });
          g.appendChild(imgEl);
        });

        // border around whole cluster (visual grouping only)
        g.appendChild(el("rect", {
          class: "cv-seph-border",
          x: startX, y: startY,
          width: dim.w, height: dim.h,
        }));

        // sephirah name below cluster
        const lbl = el("text", {
          class: "cv-seph-label",
          x: s.x,
          y: startY + dim.h + 0.1,
        });
        lbl.textContent = s.label;
        g.appendChild(lbl);

        svg.appendChild(g);
      }

      const container = document.getElementById("svg-container");
      container.innerHTML = "";
      container.appendChild(svg);
    }

    // ─── VIEW TOGGLE ──────────────────────────────────────────────────────────

    function toggleView() {
      cardView = !cardView;
      if (!cardView) { panX = 0; panY = 0; }
      document.getElementById("view-toggle").textContent = cardView ? "Symbol View" : "Card View";
      document.getElementById("app").classList.toggle("card-view-mode", cardView);
      if (cardView) renderCardView();
      else render();
    }

    // ─── INFO PANEL ───────────────────────────────────────────────────────────

    function renderCardGallery(cards) {
      return `<div class="card-gallery">${cards.map(c =>
        `<div class="card-thumb-wrap" onclick="openLightbox('${c.img}','${c.name}')">
          <img class="card-thumb" src="${c.img}" alt="${c.name}" loading="lazy">
          <span class="card-thumb-name">${c.name}</span>
        </div>`
      ).join("")}</div>`;
    }

    function renderContent(item) {
      let html = "";

      // For paths: show Atu card before notes
      if (item.atu) {
        html += `<p><strong>Trump</strong><br>${item.atu.name}</p>`;
        html += renderCardGallery([item.atu]);
      }

      if (item.fields && item.fields.length) {
        html += item.fields.map(f => {
          let out = `<p><strong>${f.label}</strong><br>${f.value}</p>`;
          if (f.label === "Tarot Correspondence" && item.cards && item.cards.length) {
            out += renderCardGallery(item.cards);
          }
          return out;
        }).join("");
      } else if (!item.atu) {
        html += item.text || "<p>No notes yet.</p>";
      } else {
        html += item.text || "";
      }

      return html;
    }

    const mobileQuery = window.matchMedia("(max-width: 700px)");

    function mobileBack() {
      document.getElementById("app").classList.remove("show-info");
    }

    function showInfo(label, title, item) {
      document.getElementById("info-empty").style.display = "none";
      document.getElementById("info-content").classList.add("visible");
      document.getElementById("info-label").textContent = label;
      document.getElementById("info-title").textContent = title;
      document.getElementById("info-text").innerHTML = renderContent(item);
      document.getElementById("info-panel").scrollTop = 0;
      if (mobileQuery.matches) {
        document.getElementById("app").classList.add("show-info");
      }
    }

    function openPathPopup(path) {
      showInfo(`PATH ${path.n}`, `${path.letter} — ${path.heb}`, path);
      document.querySelectorAll(".sephirah, .cv-group").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".path-group, .cv-path-group").forEach(g => g.classList.remove("active"));
      document.querySelector(`.path-group[data-path-n="${path.n}"]`)?.classList.add("active");
      document.querySelector(`.cv-path-group[data-path-n="${path.n}"]`)?.classList.add("active");
    }

    function openPopup(s) {
      showInfo(`SEPHIRAH ${s.n}`, s.title, s);
      document.querySelectorAll(".sephirah, .cv-group").forEach(c => c.classList.remove("active"));
      document.querySelectorAll(".path-group, .cv-path-group").forEach(g => g.classList.remove("active"));
      document.getElementById(s.id)?.classList.add("active");
      document.querySelector(`.cv-group[data-seph-id="${s.id}"]`)?.classList.add("active");
    }

    // ─── LIGHTBOX ─────────────────────────────────────────────────────────────

    function openLightbox(src, caption) {
      document.getElementById("lightbox-img").src = src;
      document.getElementById("lightbox-caption").textContent = caption;
      document.getElementById("lightbox").classList.add("open");
    }

    function closeLightbox() {
      document.getElementById("lightbox").classList.remove("open");
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Escape") closeLightbox();
    });

    // ─── SCALE SLIDER ─────────────────────────────────────────────────────────

    const slider = document.getElementById("zoom-slider");
    slider.addEventListener("input", () => {
      zoomLevel = parseFloat(slider.value);
      if (cardView) renderCardView();
      else render();
    });

    // ─── INIT ─────────────────────────────────────────────────────────────────

    async function init() {
      try {
        const data = await fetch("data.json").then(r => r.json());
        SEPHIROTH = data.sephiroth;
        PATHS = data.paths;
        render();
      } catch (e) {
        document.getElementById("info-empty").textContent =
          "Could not load data.json — make sure it is in the same folder and you are running a local server.";
        console.error(e);
      }
    }

    init();

    // ─── DRAG-TO-PAN (card view only) ─────────────────────────────────────────

    function startPan(clientX, clientY) {
      isPanning = true;
      didPan = false;
      panStart = { x: clientX, y: clientY, px: panX, py: panY };
      document.getElementById("svg-container").classList.add("dragging");
    }

    function movePan(clientX, clientY) {
      if (!isPanning) return;
      const svgEl = document.querySelector("#svg-container svg");
      if (!svgEl) return;
      const ctm = svgEl.getScreenCTM();
      if (!ctm) return;
      // ctm.a = screen pixels per SVG unit; invert to get SVG units per pixel
      const scale = ctm.a;
      const dx = (clientX - panStart.x) / scale;
      const dy = (clientY - panStart.y) / scale;
      if (Math.abs(clientX - panStart.x) > 4 || Math.abs(clientY - panStart.y) > 4) didPan = true;
      panX = panStart.px - dx;
      panY = panStart.py - dy;
      svgEl.setAttribute("viewBox", viewBoxForZoom(cvFullVbW, cvFullVbH));
    }

    function endPan() {
      if (!isPanning) return;
      isPanning = false;
      document.getElementById("svg-container").classList.remove("dragging");
    }

    const svgContainer = document.getElementById("svg-container");

    svgContainer.addEventListener("mousedown", e => {
      if (!cardView) return;
      e.preventDefault();
      startPan(e.clientX, e.clientY);
    });
    document.addEventListener("mousemove", e => { movePan(e.clientX, e.clientY); });
    document.addEventListener("mouseup", endPan);

    svgContainer.addEventListener("touchstart", e => {
      if (!cardView || e.touches.length !== 1) return;
      startPan(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    svgContainer.addEventListener("touchmove", e => {
      if (e.touches.length !== 1) return;
      movePan(e.touches[0].clientX, e.touches[0].clientY);
    }, { passive: true });
    svgContainer.addEventListener("touchend", endPan, { passive: true });

    // Capture-phase click handler: suppress lightbox if the mousedown was a drag
    svgContainer.addEventListener("click", e => {
      if (didPan) {
        e.stopImmediatePropagation();
        didPan = false;
      }
    }, true);

  </script>
</body>
</html>
